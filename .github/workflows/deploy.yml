name: Build and Deploy Bookshelf

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'covers/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  schedule:
    # Daily at 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: 4453bde340384a27a120ad5a882a847c
        run: node scripts/sync-from-notion.mjs

      - name: Scrape new covers
        run: node scripts/scrape-covers.mjs

      - name: Commit sync changes (if any)
        run: |
          if [[ -n "$(git status --porcelain data/books.csv covers/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/books.csv covers/
            git commit -m "sync: 노션 DB 자동 업데이트"
            git push
          else
            echo "변경 사항 없음."
          fi

      - name: Build site
        run: node scripts/build-site.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
